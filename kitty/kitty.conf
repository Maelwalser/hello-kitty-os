# ╔══════════════════════════════════════════════╗
# ║    ♡  Hello Kitty Y2K — Kitty Terminal  ♡    ║
# ╚══════════════════════════════════════════════╝
#
# Place this file at: ~/.config/kitty/kitty.conf
# Or import it with: include hellokitty-y2k.conf

# ── Fonts ──────────────────────────────────────
# Use a rounded/bubbly font for the full 2000s look:
#   sudo pacman -S ttf-jetbrains-mono
#   yay -S ttf-comic-mono  (for maximum Y2K energy)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

disable_ligatures never

# ── Cursor ─────────────────────────────────────
cursor                  #FF69B4
cursor_text_color       #320F23
cursor_shape            beam
cursor_beam_thickness   1.8
cursor_blink_interval   0.5
cursor_stop_blinking_after 0

# ── Scrollback ─────────────────────────────────
scrollback_lines        10000
scrollback_pager_history_size 4

# ── Mouse ──────────────────────────────────────
mouse_hide_wait         3.0
url_color               #FF00AA
url_style               curly
open_url_with           default
url_prefixes            file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls             yes
copy_on_select          clipboard

# ── Bell ───────────────────────────────────────
enable_audio_bell       no
visual_bell_duration    0.0
bell_on_tab             "♡ "

# ── Window Layout ──────────────────────────────
remember_window_size    yes
initial_window_width    100c
initial_window_height   32c
window_padding_width    10 14
window_margin_width     0
single_window_margin_width -1
placement_strategy      center

draw_minimal_borders    yes
window_border_width     1.0pt
active_border_color     #FF69B4
inactive_border_color   #C8A0B0
inactive_text_alpha     0.75

hide_window_decorations no
confirm_os_window_close 1

# ── Tab Bar ────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     round
tab_bar_align           left
tab_bar_min_tabs        2
tab_switch_strategy     previous
tab_activity_symbol     ♡
tab_title_max_length    20
tab_title_template      " {fmt.fg.tab}{bell_symbol}{activity_symbol}{title} "
active_tab_title_template " ♡ {title} ♡ "

active_tab_foreground   #FFFFFF
active_tab_background   #FF69B4
active_tab_font_style   bold
inactive_tab_foreground #4A2040
inactive_tab_background #FFD0E0
inactive_tab_font_style normal
tab_bar_background      #FFE0EC
tab_bar_margin_color    #FFE0EC

# ── Color Scheme ───────────────────────────────
# Deep plum base with Hello Kitty pink palette
background              #320F23
foreground              #FFDCEB
selection_background    #FF69B4
selection_foreground    #FFFFFF

background_opacity      0.93
background_blur         12
dynamic_background_opacity yes

# Black (dark plum tones)
color0                  #3C1930
color8                  #5A3050

# Red (hot pink / rose)
color1                  #FF5078
color9                  #FF6E96

# Green (soft pink — keeps readability for success/git)
color2                  #FF96BE
color10                 #FFB4D2

# Yellow / Orange (warm peach)
color3                  #FFB478
color11                 #FFD296

# Blue (lavender / purple)
color4                  #C882FF
color12                 #DCA0FF

# Magenta (Hello Kitty signature pink)
color5                  #FF69B4
color13                 #FF8CC8

# Cyan (soft rose)
color6                  #FFA0D2
color14                 #FFBEE4

# White (cream / blush)
color7                  #FFDCEB
color15                 #FFF5FA

# Extended / marks colors
mark1_foreground        #320F23
mark1_background        #FF69B4
mark2_foreground        #320F23
mark2_background        #FFB478
mark3_foreground        #320F23
mark3_background        #C882FF

# ── Advanced ───────────────────────────────────
shell_integration       enabled
allow_hyperlinks        yes
term                    xterm-kitty

# ── OS-Specific ────────────────────────────────
linux_display_server    auto
wayland_titlebar_color  #FF69B4

# ── Keyboard Shortcuts ─────────────────────────
# Defaults are fine, but add a quick opacity toggle
map ctrl+shift+a>1 set_background_opacity 1.0
map ctrl+shift+a>d set_background_opacity default
map ctrl+shift+a>m set_background_opacity 0.85

# Quick theme reload
map ctrl+shift+f5 load_config_file

# Tab management (matching the pink vibes)
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+. set_tab_title
