<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFD6E8"/>
      <stop offset="40%" stop-color="#FFCADD"/>
      <stop offset="100%" stop-color="#FFB6D0"/>
    </linearGradient>

    <!-- Kitty face pattern element (simplified silhouette) -->
    <g id="kitty-face">
      <!-- Head -->
      <ellipse cx="0" cy="0" rx="18" ry="16" fill="none" stroke-width="1.5"/>
      <!-- Left ear -->
      <polygon points="-16,-10 -12,-22 -6,-12" fill="none" stroke-width="1.2"/>
      <!-- Right ear -->
      <polygon points="16,-10 12,-22 6,-12" fill="none" stroke-width="1.2"/>
      <!-- Eyes -->
      <ellipse cx="-6" cy="-1" rx="2.2" ry="2.8" fill="currentColor"/>
      <ellipse cx="6" cy="-1" rx="2.2" ry="2.8" fill="currentColor"/>
      <!-- Nose -->
      <ellipse cx="0" cy="4" rx="2" ry="1.5" fill="currentColor"/>
      <!-- Whiskers -->
      <line x1="-20" y1="2" x2="-8" y2="3" stroke-width="0.8"/>
      <line x1="-19" y1="6" x2="-8" y2="5" stroke-width="0.8"/>
      <line x1="8" y1="3" x2="20" y2="2" stroke-width="0.8"/>
      <line x1="8" y1="5" x2="19" y2="6" stroke-width="0.8"/>
      <!-- Bow -->
      <ellipse cx="15" cy="-14" rx="6" ry="4" fill="currentColor" opacity="0.6"/>
      <ellipse cx="21" cy="-14" rx="6" ry="4" fill="currentColor" opacity="0.6"/>
      <circle cx="18" cy="-14" r="2" fill="currentColor"/>
    </g>

    <!-- Heart -->
    <g id="heart">
      <path d="M0,-6 C-3,-10 -9,-10 -9,-5 C-9,-1 0,6 0,6 C0,6 9,-1 9,-5 C9,-10 3,-10 0,-6Z" fill="currentColor"/>
    </g>

    <!-- Star (4-point sparkle) -->
    <g id="sparkle">
      <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5Z" fill="currentColor"/>
    </g>

    <!-- 5-point star -->
    <g id="star5">
      <path d="M0,-7 L1.8,-2.2 L7,-2.2 L2.8,0.8 L4.2,6 L0,3 L-4.2,6 L-2.8,0.8 L-7,-2.2 L-1.8,-2.2Z" fill="currentColor"/>
    </g>

    <!-- Bow standalone -->
    <g id="bow">
      <ellipse cx="-7" cy="0" rx="7" ry="5" fill="currentColor"/>
      <ellipse cx="7" cy="0" rx="7" ry="5" fill="currentColor"/>
      <circle cx="0" cy="0" r="2.5" fill="currentColor" opacity="0.8"/>
      <path d="M-2,2 C-2,5 2,5 2,2" stroke="currentColor" fill="none" stroke-width="1.5"/>
    </g>

    <!-- Small flower -->
    <g id="flower">
      <circle cx="4" cy="0" r="3" fill="currentColor" opacity="0.5"/>
      <circle cx="-4" cy="0" r="3" fill="currentColor" opacity="0.5"/>
      <circle cx="0" cy="4" r="3" fill="currentColor" opacity="0.5"/>
      <circle cx="0" cy="-4" r="3" fill="currentColor" opacity="0.5"/>
      <circle cx="0" cy="0" r="2" fill="currentColor"/>
    </g>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle diagonal stripe pattern for Y2K texture -->
  <g opacity="0.04">
    <pattern id="stripes" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="#FF69B4"/>
    </pattern>
    <rect width="1920" height="1080" fill="url(#stripes)"/>
  </g>

  <!-- ===== TILED KITTY FACES ===== -->
  <!-- Row 1 -->
  <g stroke="#F0A0B8" color="#F0A0B8" opacity="0.25">
    <use href="#kitty-face" transform="translate(120,100)"/>
    <use href="#kitty-face" transform="translate(360,100)"/>
    <use href="#kitty-face" transform="translate(600,100)"/>
    <use href="#kitty-face" transform="translate(840,100)"/>
    <use href="#kitty-face" transform="translate(1080,100)"/>
    <use href="#kitty-face" transform="translate(1320,100)"/>
    <use href="#kitty-face" transform="translate(1560,100)"/>
    <use href="#kitty-face" transform="translate(1800,100)"/>
  </g>
  <!-- Row 2 offset -->
  <g stroke="#F0A0B8" color="#F0A0B8" opacity="0.2">
    <use href="#kitty-face" transform="translate(240,280)"/>
    <use href="#kitty-face" transform="translate(480,280)"/>
    <use href="#kitty-face" transform="translate(720,280)"/>
    <use href="#kitty-face" transform="translate(960,280)"/>
    <use href="#kitty-face" transform="translate(1200,280)"/>
    <use href="#kitty-face" transform="translate(1440,280)"/>
    <use href="#kitty-face" transform="translate(1680,280)"/>
  </g>
  <!-- Row 3 -->
  <g stroke="#F0A0B8" color="#F0A0B8" opacity="0.22">
    <use href="#kitty-face" transform="translate(120,460)"/>
    <use href="#kitty-face" transform="translate(360,460)"/>
    <use href="#kitty-face" transform="translate(600,460)"/>
    <use href="#kitty-face" transform="translate(840,460)"/>
    <use href="#kitty-face" transform="translate(1080,460)"/>
    <use href="#kitty-face" transform="translate(1320,460)"/>
    <use href="#kitty-face" transform="translate(1560,460)"/>
    <use href="#kitty-face" transform="translate(1800,460)"/>
  </g>
  <!-- Row 4 offset -->
  <g stroke="#F0A0B8" color="#F0A0B8" opacity="0.18">
    <use href="#kitty-face" transform="translate(240,640)"/>
    <use href="#kitty-face" transform="translate(480,640)"/>
    <use href="#kitty-face" transform="translate(720,640)"/>
    <use href="#kitty-face" transform="translate(960,640)"/>
    <use href="#kitty-face" transform="translate(1200,640)"/>
    <use href="#kitty-face" transform="translate(1440,640)"/>
    <use href="#kitty-face" transform="translate(1680,640)"/>
  </g>
  <!-- Row 5 -->
  <g stroke="#F0A0B8" color="#F0A0B8" opacity="0.2">
    <use href="#kitty-face" transform="translate(120,820)"/>
    <use href="#kitty-face" transform="translate(360,820)"/>
    <use href="#kitty-face" transform="translate(600,820)"/>
    <use href="#kitty-face" transform="translate(840,820)"/>
    <use href="#kitty-face" transform="translate(1080,820)"/>
    <use href="#kitty-face" transform="translate(1320,820)"/>
    <use href="#kitty-face" transform="translate(1560,820)"/>
    <use href="#kitty-face" transform="translate(1800,820)"/>
  </g>
  <!-- Row 6 offset -->
  <g stroke="#F0A0B8" color="#F0A0B8" opacity="0.16">
    <use href="#kitty-face" transform="translate(240,1000)"/>
    <use href="#kitty-face" transform="translate(480,1000)"/>
    <use href="#kitty-face" transform="translate(720,1000)"/>
    <use href="#kitty-face" transform="translate(960,1000)"/>
    <use href="#kitty-face" transform="translate(1200,1000)"/>
    <use href="#kitty-face" transform="translate(1440,1000)"/>
    <use href="#kitty-face" transform="translate(1680,1000)"/>
  </g>

  <!-- ===== SCATTERED HEARTS ===== -->
  <g color="#FF90B8" opacity="0.2">
    <use href="#heart" transform="translate(80,200) scale(0.8)"/>
    <use href="#heart" transform="translate(300,50) scale(1.1)"/>
    <use href="#heart" transform="translate(520,330) scale(0.7)"/>
    <use href="#heart" transform="translate(750,180) scale(0.9)"/>
    <use href="#heart" transform="translate(1000,70) scale(1.0)"/>
    <use href="#heart" transform="translate(1250,350) scale(0.6)"/>
    <use href="#heart" transform="translate(1500,200) scale(0.85)"/>
    <use href="#heart" transform="translate(1750,120) scale(0.75)"/>
    <use href="#heart" transform="translate(200,550) scale(0.65)"/>
    <use href="#heart" transform="translate(450,700) scale(0.9)"/>
    <use href="#heart" transform="translate(700,560) scale(0.7)"/>
    <use href="#heart" transform="translate(950,750) scale(0.8)"/>
    <use href="#heart" transform="translate(1150,580) scale(1.0)"/>
    <use href="#heart" transform="translate(1400,680) scale(0.6)"/>
    <use href="#heart" transform="translate(1650,530) scale(0.85)"/>
    <use href="#heart" transform="translate(1850,700) scale(0.7)"/>
    <use href="#heart" transform="translate(100,900) scale(0.9)"/>
    <use href="#heart" transform="translate(350,880) scale(0.75)"/>
    <use href="#heart" transform="translate(650,950) scale(0.6)"/>
    <use href="#heart" transform="translate(900,870) scale(0.8)"/>
    <use href="#heart" transform="translate(1100,980) scale(0.7)"/>
    <use href="#heart" transform="translate(1350,910) scale(0.65)"/>
    <use href="#heart" transform="translate(1600,860) scale(0.9)"/>
    <use href="#heart" transform="translate(1830,950) scale(0.55)"/>
  </g>

  <!-- ===== SPARKLES ===== -->
  <g color="#FFD0E0" opacity="0.25">
    <use href="#sparkle" transform="translate(170,150) scale(0.6)"/>
    <use href="#sparkle" transform="translate(430,230) scale(0.5)"/>
    <use href="#sparkle" transform="translate(670,90) scale(0.7)"/>
    <use href="#sparkle" transform="translate(910,310) scale(0.55)"/>
    <use href="#sparkle" transform="translate(1150,170) scale(0.65)"/>
    <use href="#sparkle" transform="translate(1380,260) scale(0.5)"/>
    <use href="#sparkle" transform="translate(1620,130) scale(0.7)"/>
    <use href="#sparkle" transform="translate(1860,290) scale(0.6)"/>
    <use href="#sparkle" transform="translate(50,480) scale(0.55)"/>
    <use href="#sparkle" transform="translate(300,600) scale(0.7)"/>
    <use href="#sparkle" transform="translate(550,500) scale(0.5)"/>
    <use href="#sparkle" transform="translate(800,620) scale(0.6)"/>
    <use href="#sparkle" transform="translate(1050,510) scale(0.65)"/>
    <use href="#sparkle" transform="translate(1300,630) scale(0.5)"/>
    <use href="#sparkle" transform="translate(1550,480) scale(0.55)"/>
    <use href="#sparkle" transform="translate(1780,600) scale(0.7)"/>
  </g>

  <!-- ===== SMALL STARS ===== -->
  <g color="#FFC0D4" opacity="0.18">
    <use href="#star5" transform="translate(250,170) scale(0.7)"/>
    <use href="#star5" transform="translate(550,250) scale(0.5)"/>
    <use href="#star5" transform="translate(850,130) scale(0.6)"/>
    <use href="#star5" transform="translate(1100,270) scale(0.55)"/>
    <use href="#star5" transform="translate(1400,160) scale(0.65)"/>
    <use href="#star5" transform="translate(1700,240) scale(0.5)"/>
    <use href="#star5" transform="translate(150,720) scale(0.6)"/>
    <use href="#star5" transform="translate(500,810) scale(0.7)"/>
    <use href="#star5" transform="translate(850,730) scale(0.5)"/>
    <use href="#star5" transform="translate(1200,800) scale(0.55)"/>
    <use href="#star5" transform="translate(1550,740) scale(0.65)"/>
    <use href="#star5" transform="translate(1870,810) scale(0.5)"/>
  </g>

  <!-- ===== BOWS ===== -->
  <g color="#FFB0C8" opacity="0.15">
    <use href="#bow" transform="translate(190,380) scale(0.7)"/>
    <use href="#bow" transform="translate(500,420) scale(0.55)"/>
    <use href="#bow" transform="translate(810,360) scale(0.65)"/>
    <use href="#bow" transform="translate(1100,430) scale(0.5)"/>
    <use href="#bow" transform="translate(1400,370) scale(0.7)"/>
    <use href="#bow" transform="translate(1700,410) scale(0.6)"/>
  </g>

  <!-- ===== FLOWERS ===== -->
  <g color="#FFC0D8" opacity="0.15">
    <use href="#flower" transform="translate(100,580) scale(0.8)"/>
    <use href="#flower" transform="translate(400,520) scale(0.6)"/>
    <use href="#flower" transform="translate(700,610) scale(0.7)"/>
    <use href="#flower" transform="translate(1050,540) scale(0.65)"/>
    <use href="#flower" transform="translate(1350,590) scale(0.75)"/>
    <use href="#flower" transform="translate(1650,560) scale(0.6)"/>
  </g>

  <!-- ===== CENTER FEATURE: Large kitty face watermark ===== -->
  <g stroke="#F5B0C8" color="#F5B0C8" opacity="0.08" transform="translate(960,540) scale(6)">
    <use href="#kitty-face"/>
  </g>

  <!-- ===== CORNER DECORATIONS (Y2K frame vibes) ===== -->
  <!-- Top-left -->
  <g color="#FFB0C4" opacity="0.12">
    <use href="#bow" transform="translate(50,40) scale(1.2)"/>
    <use href="#sparkle" transform="translate(90,35) scale(0.8)"/>
  </g>
  <!-- Top-right -->
  <g color="#FFB0C4" opacity="0.12">
    <use href="#bow" transform="translate(1870,40) scale(1.2) scale(-1,1)"/>
    <use href="#sparkle" transform="translate(1830,35) scale(0.8)"/>
  </g>
  <!-- Bottom-left -->
  <g color="#FFB0C4" opacity="0.12">
    <use href="#bow" transform="translate(50,1040) scale(1.2)"/>
    <use href="#sparkle" transform="translate(90,1045) scale(0.8)"/>
  </g>
  <!-- Bottom-right -->
  <g color="#FFB0C4" opacity="0.12">
    <use href="#bow" transform="translate(1870,1040) scale(1.2) scale(-1,1)"/>
    <use href="#sparkle" transform="translate(1830,1045) scale(0.8)"/>
  </g>
</svg>
