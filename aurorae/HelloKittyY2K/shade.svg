<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   width="130" height="26" viewBox="0 0 130 26" version="1.1">
  <defs>
    <linearGradient id="btnFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb8d0"/><stop offset="100%" stop-color="#ff90b8"/>
    </linearGradient>
    <linearGradient id="btnFaceHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc8dd"/><stop offset="100%" stop-color="#ffa0c8"/>
    </linearGradient>
    <linearGradient id="btnFacePressed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e880a8"/><stop offset="100%" stop-color="#ff90b8"/>
    </linearGradient>
    <linearGradient id="btnFaceInactive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d0dc"/><stop offset="100%" stop-color="#dcc0d0"/>
    </linearGradient>
  </defs>

  <g id="center" inkscape:label="center">
    <rect x="1" y="1" width="24" height="24" rx="1" fill="#880040"/>
    <rect x="1" y="1" width="23" height="23" rx="1" fill="#ffdcec"/>
    <rect x="2" y="2" width="23" height="23" rx="1" fill="#aa4070"/>
    <rect x="2" y="2" width="22" height="22" rx="1" fill="#ffe8f0"/>
    <rect x="3" y="3" width="22" height="22" rx="1" fill="#cc6090"/>
    <rect x="3" y="3" width="20" height="20" rx="1" fill="url(#btnFace)"/>
    <!-- Shade lines glyph -->
    <line x1="7" y1="8" x2="19" y2="8" stroke="#880040" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="13" x2="19" y2="13" stroke="#880040" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="18" x2="19" y2="18" stroke="#880040" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g id="hover-center" inkscape:label="hover-center">
    <rect x="33" y="1" width="24" height="24" rx="1" fill="#990050"/>
    <rect x="33" y="1" width="23" height="23" rx="1" fill="#ffe4f2"/>
    <rect x="34" y="2" width="23" height="23" rx="1" fill="#bb5080"/>
    <rect x="34" y="2" width="22" height="22" rx="1" fill="#fff0f5"/>
    <rect x="35" y="3" width="22" height="22" rx="1" fill="#dd70a0"/>
    <rect x="35" y="3" width="20" height="20" rx="1" fill="url(#btnFaceHover)"/>
    <line x1="39" y1="8" x2="51" y2="8" stroke="#990050" stroke-width="2" stroke-linecap="round"/>
    <line x1="39" y1="13" x2="51" y2="13" stroke="#990050" stroke-width="2" stroke-linecap="round"/>
    <line x1="39" y1="18" x2="51" y2="18" stroke="#990050" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g id="pressed-center" inkscape:label="pressed-center">
    <rect x="65" y="1" width="24" height="24" rx="1" fill="#880040"/>
    <rect x="65" y="1" width="23" height="23" rx="1" fill="#aa4070"/>
    <rect x="66" y="2" width="23" height="23" rx="1" fill="#ffdcec"/>
    <rect x="66" y="2" width="22" height="22" rx="1" fill="#cc6090"/>
    <rect x="67" y="3" width="22" height="22" rx="1" fill="#ffe8f0"/>
    <rect x="67" y="3" width="20" height="20" rx="1" fill="url(#btnFacePressed)"/>
    <line x1="72" y1="9" x2="84" y2="9" stroke="#880040" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="14" x2="84" y2="14" stroke="#880040" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="19" x2="84" y2="19" stroke="#880040" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g id="deactivated-center" inkscape:label="deactivated-center">
    <rect x="97" y="1" width="24" height="24" rx="1" fill="#a08090"/>
    <rect x="97" y="1" width="23" height="23" rx="1" fill="#f0e0e8"/>
    <rect x="98" y="2" width="23" height="23" rx="1" fill="#b898a8"/>
    <rect x="98" y="2" width="22" height="22" rx="1" fill="#f0e8ec"/>
    <rect x="99" y="3" width="22" height="22" rx="1" fill="#c8b0bc"/>
    <rect x="99" y="3" width="20" height="20" rx="1" fill="url(#btnFaceInactive)"/>
    <line x1="103" y1="8" x2="115" y2="8" stroke="#a08090" stroke-width="2" stroke-linecap="round"/>
    <line x1="103" y1="13" x2="115" y2="13" stroke="#a08090" stroke-width="2" stroke-linecap="round"/>
    <line x1="103" y1="18" x2="115" y2="18" stroke="#a08090" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
