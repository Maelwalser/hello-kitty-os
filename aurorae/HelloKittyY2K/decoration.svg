<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   width="200"
   height="340"
   viewBox="0 0 200 340"
   version="1.1"
   id="SVGRoot">

  <defs>
    <!-- Active titlebar: glossy hot pink gradient -->
    <linearGradient id="titleGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb0d8" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ff69b4" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff50a0" stop-opacity="1"/>
      <stop offset="51%" stop-color="#e8408e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6ab4" stop-opacity="1"/>
    </linearGradient>

    <!-- Active titlebar top shine overlay -->
    <linearGradient id="titleShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Active border: deeper pink glass -->
    <linearGradient id="borderGloss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1493" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff3ca8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff1493" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="borderGlossV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3ca8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff1493" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e00a7a" stop-opacity="1"/>
    </linearGradient>

    <!-- Inactive titlebar: muted lavender-pink glass -->
    <linearGradient id="inactiveTitleGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c8dc" stop-opacity="1"/>
      <stop offset="35%" stop-color="#d4a0b8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#cc96b0" stop-opacity="1"/>
      <stop offset="51%" stop-color="#c08aa4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cca0b4" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="inactiveShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="inactiveBorderV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c898a8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#b88098" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a87088" stop-opacity="1"/>
    </linearGradient>

    <!-- Glow filter for active frame -->
    <filter id="outerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0.2
                0 0.3 0 0 0.1
                0 0 0.6 0 0.3
                0 0 0 0.4 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============ ACTIVE FRAME ============ -->

  <!-- Active: top-left corner -->
  <g id="decoration-topleft" inkscape:label="decoration-topleft">
    <rect x="0" y="0" width="8" height="46" fill="url(#titleGloss)"/>
    <rect x="0" y="0" width="8" height="46" fill="url(#titleShine)"/>
    <rect x="0" y="0" width="1" height="46" style="fill:#ffffff;fill-opacity:0.3"/>
  </g>

  <!-- Active: top (titlebar, stretched) -->
  <g id="decoration-top" inkscape:label="decoration-top">
    <rect x="10" y="0" width="60" height="46" fill="url(#titleGloss)"/>
    <rect x="10" y="0" width="60" height="46" fill="url(#titleShine)"/>
  </g>

  <!-- Active: top-right corner -->
  <g id="decoration-topright" inkscape:label="decoration-topright">
    <rect x="72" y="0" width="8" height="46" fill="url(#titleGloss)"/>
    <rect x="72" y="0" width="8" height="46" fill="url(#titleShine)"/>
    <rect x="79" y="0" width="1" height="46" style="fill:#000000;fill-opacity:0.15"/>
  </g>

  <!-- Active: left border -->
  <g id="decoration-left" inkscape:label="decoration-left">
    <rect x="0" y="48" width="8" height="40" fill="url(#borderGlossV)"/>
    <rect x="0" y="48" width="1" height="40" style="fill:#ffffff;fill-opacity:0.25"/>
    <rect x="7" y="48" width="1" height="40" style="fill:#000000;fill-opacity:0.08"/>
  </g>

  <!-- Active: center -->
  <g id="decoration-center" inkscape:label="decoration-center">
    <rect x="10" y="48" width="60" height="40" style="fill:#ff1493;"/>
  </g>

  <!-- Active: right border -->
  <g id="decoration-right" inkscape:label="decoration-right">
    <rect x="72" y="48" width="8" height="40" fill="url(#borderGlossV)"/>
    <rect x="72" y="48" width="1" height="40" style="fill:#ffffff;fill-opacity:0.15"/>
    <rect x="79" y="48" width="1" height="40" style="fill:#000000;fill-opacity:0.15"/>
  </g>

  <!-- Active: bottom-left corner -->
  <g id="decoration-bottomleft" inkscape:label="decoration-bottomleft">
    <rect x="0" y="90" width="8" height="8" style="fill:#e00a7a;fill-opacity:1"/>
    <rect x="0" y="90" width="1" height="8" style="fill:#ffffff;fill-opacity:0.2"/>
  </g>

  <!-- Active: bottom border -->
  <g id="decoration-bottom" inkscape:label="decoration-bottom">
    <rect x="10" y="90" width="60" height="8" style="fill:#e00a7a;fill-opacity:1"/>
    <rect x="10" y="97" width="60" height="1" style="fill:#000000;fill-opacity:0.12"/>
  </g>

  <!-- Active: bottom-right corner -->
  <g id="decoration-bottomright" inkscape:label="decoration-bottomright">
    <rect x="72" y="90" width="8" height="8" style="fill:#e00a7a;fill-opacity:1"/>
    <rect x="79" y="90" width="1" height="8" style="fill:#000000;fill-opacity:0.15"/>
  </g>

  <!-- ============ INACTIVE FRAME ============ -->

  <g id="decoration-inactive-topleft" inkscape:label="decoration-inactive-topleft">
    <rect x="0" y="110" width="8" height="46" fill="url(#inactiveTitleGloss)"/>
    <rect x="0" y="110" width="8" height="46" fill="url(#inactiveShine)"/>
  </g>

  <g id="decoration-inactive-top" inkscape:label="decoration-inactive-top">
    <rect x="10" y="110" width="60" height="46" fill="url(#inactiveTitleGloss)"/>
    <rect x="10" y="110" width="60" height="46" fill="url(#inactiveShine)"/>
  </g>

  <g id="decoration-inactive-topright" inkscape:label="decoration-inactive-topright">
    <rect x="72" y="110" width="8" height="46" fill="url(#inactiveTitleGloss)"/>
    <rect x="72" y="110" width="8" height="46" fill="url(#inactiveShine)"/>
  </g>

  <g id="decoration-inactive-left" inkscape:label="decoration-inactive-left">
    <rect x="0" y="158" width="8" height="20" fill="url(#inactiveBorderV)"/>
  </g>

  <g id="decoration-inactive-center" inkscape:label="decoration-inactive-center">
    <rect x="10" y="158" width="60" height="20" style="fill:#b88098;"/>
  </g>

  <g id="decoration-inactive-right" inkscape:label="decoration-inactive-right">
    <rect x="72" y="158" width="8" height="20" fill="url(#inactiveBorderV)"/>
  </g>

  <g id="decoration-inactive-bottomleft" inkscape:label="decoration-inactive-bottomleft">
    <rect x="0" y="180" width="8" height="8" style="fill:#a87088;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-bottom" inkscape:label="decoration-inactive-bottom">
    <rect x="10" y="180" width="60" height="8" style="fill:#a87088;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-bottomright" inkscape:label="decoration-inactive-bottomright">
    <rect x="72" y="180" width="8" height="8" style="fill:#a87088;fill-opacity:1"/>
  </g>

  <!-- ============ ACTIVE MAXIMIZED FRAME ============ -->
  <!-- Borders are 0 when maximized, but all 9 pieces must exist.
       Top pieces keep the glossy titlebar; side/bottom pieces are 1px stubs. -->

  <g id="decoration-maximized-topleft" inkscape:label="decoration-maximized-topleft">
    <rect x="0" y="200" width="8" height="46" fill="url(#titleGloss)"/>
    <rect x="0" y="200" width="8" height="46" fill="url(#titleShine)"/>
  </g>

  <g id="decoration-maximized-top" inkscape:label="decoration-maximized-top">
    <rect x="10" y="200" width="60" height="46" fill="url(#titleGloss)"/>
    <rect x="10" y="200" width="60" height="46" fill="url(#titleShine)"/>
  </g>

  <g id="decoration-maximized-topright" inkscape:label="decoration-maximized-topright">
    <rect x="72" y="200" width="8" height="46" fill="url(#titleGloss)"/>
    <rect x="72" y="200" width="8" height="46" fill="url(#titleShine)"/>
  </g>

  <g id="decoration-maximized-left" inkscape:label="decoration-maximized-left">
    <rect x="0" y="248" width="1" height="10" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-center" inkscape:label="decoration-maximized-center">
    <rect x="3" y="248" width="60" height="10" style="fill:#ff1493;"/>
  </g>

  <g id="decoration-maximized-right" inkscape:label="decoration-maximized-right">
    <rect x="65" y="248" width="1" height="10" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-bottomleft" inkscape:label="decoration-maximized-bottomleft">
    <rect x="0" y="260" width="1" height="1" style="fill:#e00a7a;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-bottom" inkscape:label="decoration-maximized-bottom">
    <rect x="3" y="260" width="60" height="1" style="fill:#e00a7a;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-bottomright" inkscape:label="decoration-maximized-bottomright">
    <rect x="65" y="260" width="1" height="1" style="fill:#e00a7a;fill-opacity:1"/>
  </g>

  <!-- ============ INACTIVE MAXIMIZED FRAME ============ -->

  <g id="decoration-maximized-inactive-topleft" inkscape:label="decoration-maximized-inactive-topleft">
    <rect x="0" y="270" width="8" height="46" fill="url(#inactiveTitleGloss)"/>
    <rect x="0" y="270" width="8" height="46" fill="url(#inactiveShine)"/>
  </g>

  <g id="decoration-maximized-inactive-top" inkscape:label="decoration-maximized-inactive-top">
    <rect x="10" y="270" width="60" height="46" fill="url(#inactiveTitleGloss)"/>
    <rect x="10" y="270" width="60" height="46" fill="url(#inactiveShine)"/>
  </g>

  <g id="decoration-maximized-inactive-topright" inkscape:label="decoration-maximized-inactive-topright">
    <rect x="72" y="270" width="8" height="46" fill="url(#inactiveTitleGloss)"/>
    <rect x="72" y="270" width="8" height="46" fill="url(#inactiveShine)"/>
  </g>

  <g id="decoration-maximized-inactive-left" inkscape:label="decoration-maximized-inactive-left">
    <rect x="0" y="318" width="1" height="10" style="fill:#b88098;fill-opacity:1"/>
  </g>

<g id="decoration-maximized-inactive-center" inkscape:label="decoration-maximized-inactive-center">
    <rect x="3" y="318" width="60" height="10" style="fill:#b88098;"/>
  </g>

  <g id="decoration-maximized-inactive-right" inkscape:label="decoration-maximized-inactive-right">
    <rect x="65" y="318" width="1" height="10" style="fill:#b88098;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-inactive-bottomleft" inkscape:label="decoration-maximized-inactive-bottomleft">
    <rect x="0" y="330" width="1" height="1" style="fill:#a87088;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-inactive-bottom" inkscape:label="decoration-maximized-inactive-bottom">
    <rect x="3" y="330" width="60" height="1" style="fill:#a87088;fill-opacity:1"/>
  </g>

  <g id="decoration-maximized-inactive-bottomright" inkscape:label="decoration-maximized-inactive-bottomright">
    <rect x="65" y="330" width="1" height="1" style="fill:#a87088;fill-opacity:1"/>
  </g>

  <rect id="hint-stretch-borders" x="0" y="0" width="1" height="1" style="fill:none"/>

</svg>
