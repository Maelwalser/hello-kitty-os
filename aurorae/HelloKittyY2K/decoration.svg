<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   width="200"
   height="200"
   viewBox="0 0 200 200"
   version="1.1"
   id="SVGRoot"
   inkscape:version="1.3 (0e150ed, 2023-07-21)">

  <!-- ACTIVE FRAME: 9-patch pieces
       Sizes: corners=8x8 (except top corners are 8x46), borders=8 wide/tall, title=46 tall
       
       Sanity checks:
       topleft h=46, top h=46, topright h=46  ✓ same height
       topleft w=8, left w=8, bottomleft w=8  ✓ same width
       topright w=8, right w=8, bottomright w=8 ✓ same width
       bottomleft h=8, bottom h=8, bottomright h=8 ✓ same height
  -->

  <!-- Active: top-left corner -->
  <g id="decoration-topleft" inkscape:label="decoration-topleft">
    <rect x="0" y="0" width="8" height="46" style="fill:#ff69b4;fill-opacity:1"/>
  </g>

  <!-- Active: top (titlebar, stretched) -->
  <g id="decoration-top" inkscape:label="decoration-top">
    <rect x="10" y="0" width="60" height="46" style="fill:#ff69b4;fill-opacity:1"/>
  </g>

  <!-- Active: top-right corner -->
  <g id="decoration-topright" inkscape:label="decoration-topright">
    <rect x="72" y="0" width="8" height="46" style="fill:#ff69b4;fill-opacity:1"/>
  </g>

  <!-- Active: left border -->
  <g id="decoration-left" inkscape:label="decoration-left">
    <rect x="0" y="48" width="8" height="40" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <!-- Active: center (window background, stretched) -->
  <g id="decoration-center" inkscape:label="decoration-center">
    <rect x="10" y="48" width="60" height="40" style="fill:#fff0f5;fill-opacity:0.95"/>
  </g>

  <!-- Active: right border -->
  <g id="decoration-right" inkscape:label="decoration-right">
    <rect x="72" y="48" width="8" height="40" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <!-- Active: bottom-left corner -->
  <g id="decoration-bottomleft" inkscape:label="decoration-bottomleft">
    <rect x="0" y="90" width="8" height="8" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <!-- Active: bottom border -->
  <g id="decoration-bottom" inkscape:label="decoration-bottom">
    <rect x="10" y="90" width="60" height="8" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <!-- Active: bottom-right corner -->
  <g id="decoration-bottomright" inkscape:label="decoration-bottomright">
    <rect x="72" y="90" width="8" height="8" style="fill:#ff1493;fill-opacity:1"/>
  </g>

  <!-- INACTIVE FRAME (muted pink) -->

  <g id="decoration-inactive-topleft" inkscape:label="decoration-inactive-topleft">
    <rect x="0" y="110" width="8" height="46" style="fill:#d4a0b0;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-top" inkscape:label="decoration-inactive-top">
    <rect x="10" y="110" width="60" height="46" style="fill:#d4a0b0;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-topright" inkscape:label="decoration-inactive-topright">
    <rect x="72" y="110" width="8" height="46" style="fill:#d4a0b0;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-left" inkscape:label="decoration-inactive-left">
    <rect x="0" y="158" width="8" height="20" style="fill:#c08898;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-center" inkscape:label="decoration-inactive-center">
    <rect x="10" y="158" width="60" height="20" style="fill:#f5e8ec;fill-opacity:0.9"/>
  </g>

  <g id="decoration-inactive-right" inkscape:label="decoration-inactive-right">
    <rect x="72" y="158" width="8" height="20" style="fill:#c08898;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-bottomleft" inkscape:label="decoration-inactive-bottomleft">
    <rect x="0" y="180" width="8" height="8" style="fill:#c08898;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-bottom" inkscape:label="decoration-inactive-bottom">
    <rect x="10" y="180" width="60" height="8" style="fill:#c08898;fill-opacity:1"/>
  </g>

  <g id="decoration-inactive-bottomright" inkscape:label="decoration-inactive-bottomright">
    <rect x="72" y="180" width="8" height="8" style="fill:#c08898;fill-opacity:1"/>
  </g>

  <!-- Hint: stretch borders instead of tiling them -->
  <rect id="hint-stretch-borders" x="0" y="0" width="1" height="1" style="fill:none"/>

</svg>
