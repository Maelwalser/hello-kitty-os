<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1100">
  <defs>
    <!-- ===== GLOSSY Y2K GRADIENTS ===== -->
    <!-- Button normal: glossy pink bevel -->
    <linearGradient id="btn-normal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD6E8"/>
      <stop offset="15%" stop-color="#FFB6C1"/>
      <stop offset="50%" stop-color="#FF9FB5"/>
      <stop offset="51%" stop-color="#FF8DA8"/>
      <stop offset="100%" stop-color="#FFA0B8"/>
    </linearGradient>
    <!-- Button focused -->
    <linearGradient id="btn-focus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0F0"/>
      <stop offset="15%" stop-color="#FFC0D0"/>
      <stop offset="50%" stop-color="#FFB0C5"/>
      <stop offset="51%" stop-color="#FFA0BA"/>
      <stop offset="100%" stop-color="#FFB0C5"/>
    </linearGradient>
    <!-- Button pressed: deep pink inset -->
    <linearGradient id="btn-press" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E86098"/>
      <stop offset="15%" stop-color="#FF69B4"/>
      <stop offset="85%" stop-color="#FF80C0"/>
      <stop offset="100%" stop-color="#FF90C8"/>
    </linearGradient>
    <!-- Button toggled -->
    <linearGradient id="btn-toggle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D45090"/>
      <stop offset="50%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF80C0"/>
    </linearGradient>
    <!-- Line edit / input -->
    <linearGradient id="lineedit-normal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8E8EE"/>
      <stop offset="5%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Tab active -->
    <linearGradient id="tab-active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4EE"/>
      <stop offset="30%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Tab inactive -->
    <linearGradient id="tab-inactive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C0D0"/>
      <stop offset="50%" stop-color="#E8B0C0"/>
      <stop offset="100%" stop-color="#E0A8B8"/>
    </linearGradient>
    <!-- Scrollbar groove -->
    <linearGradient id="groove" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0D0DD"/>
      <stop offset="50%" stop-color="#F5E0E8"/>
      <stop offset="100%" stop-color="#F0D0DD"/>
    </linearGradient>
    <!-- Scrollbar slider -->
    <linearGradient id="slider-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB0C5"/>
      <stop offset="20%" stop-color="#FFC8D8"/>
      <stop offset="50%" stop-color="#FFD4E0"/>
      <stop offset="80%" stop-color="#FFC8D8"/>
      <stop offset="100%" stop-color="#FFB0C5"/>
    </linearGradient>
    <!-- Progress bar -->
    <linearGradient id="progress-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF90C8"/>
      <stop offset="40%" stop-color="#FF69B4"/>
      <stop offset="60%" stop-color="#FF50A0"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </linearGradient>
    <!-- Menu bg -->
    <linearGradient id="menu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FFE8F0"/>
    </linearGradient>
    <!-- Menu item hover -->
    <linearGradient id="menu-hover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF80C0"/>
      <stop offset="50%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF50A0"/>
    </linearGradient>
    <!-- Header -->
    <linearGradient id="header-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD0E0"/>
      <stop offset="100%" stop-color="#FFC0D4"/>
    </linearGradient>
    <!-- Window bg -->
    <linearGradient id="window-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="100%" stop-color="#FFE8F0"/>
    </linearGradient>
    <!-- Tooltip -->
    <linearGradient id="tooltip-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8FA"/>
      <stop offset="100%" stop-color="#FFE8F0"/>
    </linearGradient>
    <!-- Toolbar -->
    <linearGradient id="toolbar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0EC"/>
      <stop offset="100%" stop-color="#FFD0E0"/>
    </linearGradient>
    <!-- Group box -->
    <linearGradient id="group-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F8"/>
      <stop offset="100%" stop-color="#FFECF2"/>
    </linearGradient>
  </defs>

  <!-- ==================== BUTTON ==================== -->
  <!-- button-normal -->
  <rect id="button-normal" x="0" y="0" width="80" height="32" rx="6" ry="6"
        fill="url(#btn-normal)" stroke="#E090A8" stroke-width="1"/>
  <!-- button-normal, top highlight -->
  <rect x="1" y="1" width="78" height="15" rx="5" ry="5"
        fill="#FFFFFF" opacity="0.25"/>

  <!-- button-focused -->
  <rect id="button-focused" x="100" y="0" width="80" height="32" rx="6" ry="6"
        fill="url(#btn-focus)" stroke="#FF69B4" stroke-width="1.5"/>
  <rect x="101" y="1" width="78" height="15" rx="5" ry="5"
        fill="#FFFFFF" opacity="0.3"/>

  <!-- button-pressed -->
  <rect id="button-pressed" x="200" y="0" width="80" height="32" rx="6" ry="6"
        fill="url(#btn-press)" stroke="#C05088" stroke-width="1"/>
  <rect x="201" y="2" width="78" height="14" rx="5" ry="5"
        fill="#000000" opacity="0.08"/>

  <!-- button-toggled -->
  <rect id="button-toggled" x="300" y="0" width="80" height="32" rx="6" ry="6"
        fill="url(#btn-toggle)" stroke="#C05088" stroke-width="1"/>

  <!-- ==================== LINE EDIT ==================== -->
  <rect id="lineedit-normal" x="0" y="50" width="200" height="30" rx="5" ry="5"
        fill="url(#lineedit-normal)" stroke="#E0A8B8" stroke-width="1"/>
  <rect id="lineedit-focused" x="220" y="50" width="200" height="30" rx="5" ry="5"
        fill="#FFFFFF" stroke="#FF69B4" stroke-width="1.5"/>

  <!-- ==================== COMBO ==================== -->
  <rect id="combo-normal" x="0" y="100" width="150" height="30" rx="5" ry="5"
        fill="url(#btn-normal)" stroke="#E090A8" stroke-width="1"/>
  <rect x="1" y="101" width="148" height="14" rx="4" ry="4"
        fill="#FFFFFF" opacity="0.2"/>

  <!-- ==================== TABS ==================== -->
  <rect id="tab-active-top" x="0" y="150" width="100" height="30" rx="6" ry="6"
        fill="url(#tab-active)" stroke="#E0A8B8" stroke-width="1"/>
  <rect id="tab-inactive-top" x="120" y="150" width="100" height="30" rx="6" ry="6"
        fill="url(#tab-inactive)" stroke="#D0A0B0" stroke-width="1"/>
  <rect id="tabframe" x="0" y="180" width="240" height="80" rx="4" ry="4"
        fill="#FFF0F5" stroke="#E0A8B8" stroke-width="1"/>

  <!-- ==================== SCROLLBAR ==================== -->
  <!-- groove -->
  <rect id="scrollbargroove" x="0" y="280" width="14" height="120" rx="7" ry="7"
        fill="url(#groove)" stroke="#E0C0CC" stroke-width="0.5"/>
  <!-- slider -->
  <rect id="scrollbar-normal" x="30" y="280" width="14" height="50" rx="7" ry="7"
        fill="url(#slider-grad)" stroke="#D0A0B8" stroke-width="1"/>
  <!-- grip marks on slider -->
  <line x1="34" y1="300" x2="40" y2="300" stroke="#D0A0B8" stroke-width="1"/>
  <line x1="34" y1="304" x2="40" y2="304" stroke="#D0A0B8" stroke-width="1"/>
  <line x1="34" y1="308" x2="40" y2="308" stroke="#D0A0B8" stroke-width="1"/>

  <!-- ==================== PROGRESS BAR ==================== -->
  <rect id="progress-groove" x="0" y="420" width="300" height="20" rx="10" ry="10"
        fill="#F0D0DD" stroke="#E0B0C0" stroke-width="1"/>
  <rect id="progress-pattern" x="0" y="450" width="200" height="20" rx="10" ry="10"
        fill="url(#progress-grad)" stroke="#D06090" stroke-width="1"/>
  <!-- Gloss on progress -->
  <rect x="1" y="451" width="198" height="9" rx="9" ry="9"
        fill="#FFFFFF" opacity="0.3"/>

  <!-- ==================== MENU ==================== -->
  <rect id="menu" x="0" y="490" width="200" height="150" rx="6" ry="6"
        fill="url(#menu-bg)" stroke="#E0A8B8" stroke-width="1"/>
  <rect id="menuitem-focus" x="0" y="660" width="200" height="28" rx="4" ry="4"
        fill="url(#menu-hover)"/>
  <rect x="1" y="661" width="198" height="13" rx="3" ry="3"
        fill="#FFFFFF" opacity="0.15"/>

  <!-- ==================== MENUBAR ==================== -->
  <rect id="menubar" x="0" y="710" width="400" height="28"
        fill="url(#toolbar-grad)" stroke="#E0B0C4" stroke-width="0.5"/>
  <rect id="menubaritem-focus" x="0" y="750" width="80" height="24" rx="4" ry="4"
        fill="#FFD0E0" stroke="#FF69B4" stroke-width="0.5"/>

  <!-- ==================== HEADER ==================== -->
  <rect id="header-section" x="0" y="790" width="150" height="28"
        fill="url(#header-grad)" stroke="#D0A0B8" stroke-width="1"/>

  <!-- ==================== TOOLTIP ==================== -->
  <rect id="tooltip" x="0" y="830" width="180" height="40" rx="6" ry="6"
        fill="url(#tooltip-bg)" stroke="#FFB6C1" stroke-width="1"/>

  <!-- ==================== GROUP ==================== -->
  <rect id="group" x="0" y="890" width="250" height="80" rx="8" ry="8"
        fill="url(#group-bg)" stroke="#E0B0C4" stroke-width="1"/>

  <!-- ==================== TOOLBAR ==================== -->
  <rect id="toolbar" x="0" y="990" width="400" height="36"
        fill="url(#toolbar-grad)" stroke="#E0B0C4" stroke-width="0.5"/>

  <!-- ==================== WINDOW ==================== -->
  <rect id="window" x="400" y="0" width="280" height="200"
        fill="url(#window-bg)"/>

  <!-- ==================== RADIO & CHECK (indicative) ==================== -->
  <!-- Radio normal -->
  <circle id="radio-normal" cx="420" cy="250" r="9"
          fill="#FFFFFF" stroke="#E0A8B8" stroke-width="1.5"/>
  <!-- Radio checked -->
  <circle id="radio-checked" cx="450" cy="250" r="9"
          fill="#FFFFFF" stroke="#FF69B4" stroke-width="1.5"/>
  <circle cx="450" cy="250" r="4.5" fill="#FF69B4"/>

  <!-- Checkbox normal -->
  <rect id="checkbox-normal" x="480" y="241" width="18" height="18" rx="3" ry="3"
        fill="#FFFFFF" stroke="#E0A8B8" stroke-width="1.5"/>
  <!-- Checkbox checked -->
  <rect id="checkbox-checked" x="510" y="241" width="18" height="18" rx="3" ry="3"
        fill="#FF69B4" stroke="#D05090" stroke-width="1.5"/>
  <!-- Checkmark -->
  <polyline points="514,250 517,254 524,245" fill="none" stroke="#FFFFFF" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ==================== SLIDER HANDLE ==================== -->
  <circle id="sliderhandle" cx="420" cy="300" r="9"
          fill="url(#btn-normal)" stroke="#D0A0B8" stroke-width="1"/>
  <circle cx="420" cy="300" r="5"
          fill="#FFFFFF" opacity="0.3"/>

  <!-- ==================== DOCK ==================== -->
  <rect id="dock" x="400" y="330" width="200" height="60"
        fill="#FFF0F5" stroke="#E0B0C4" stroke-width="1"/>

  <!-- ==================== SPLITTER ==================== -->
  <rect id="splitter" x="400" y="410" width="7" height="60"
        fill="#F0D0DD"/>
  <circle cx="403" cy="430" r="1.5" fill="#D0A0B8"/>
  <circle cx="403" cy="438" r="1.5" fill="#D0A0B8"/>
  <circle cx="403" cy="446" r="1.5" fill="#D0A0B8"/>

  <!-- ==================== SIZE GRIP ==================== -->
  <g id="sizegrip" transform="translate(400,490)">
    <circle cx="12" cy="12" r="1.5" fill="#D0A0B8"/>
    <circle cx="8" cy="12" r="1.5" fill="#D0A0B8"/>
    <circle cx="12" cy="8" r="1.5" fill="#D0A0B8"/>
    <circle cx="4" cy="12" r="1.5" fill="#D0A0B8"/>
    <circle cx="8" cy="8" r="1.5" fill="#D0A0B8"/>
    <circle cx="12" cy="4" r="1.5" fill="#D0A0B8"/>
  </g>
</svg>
